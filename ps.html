<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayStation - Free Games Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        .ps-games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .ps-game-card {
            background: rgba(10, 10, 30, 0.7);
            border: 1px solid rgba(0, 123, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .ps-game-card:hover {
            border-color: rgba(0, 123, 255, 0.6);
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.2);
            transform: translateY(-3px);
        }
        .ps-game-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        .ps-badge-free {
            display: inline-block;
            background: linear-gradient(135deg, #003087, #0070cc);
            color: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 112, 204, 0.3);
            margin-bottom: 12px;
        }
        .ps-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #003087, #0070cc);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 12px;
            transition: all 0.3s;
        }
        .ps-btn:hover {
            box-shadow: 0 0 25px rgba(0, 112, 204, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <span class="logo-icon"><i class="fas fa-gamepad"></i></span>
                <span class="logo-text">Free <span style="color:#ff0080;">Games</span> Hub</span>
            </div>
            <div style="display:flex;align-items:center;gap:15px;">
                <a href="history.html" style="color:#f5c518;text-decoration:none;font-weight:bold;font-size:14px;">📦 История</a>
                <div class="lang-dropdown">
                    <button class="lang-dropdown-btn" id="langDropdownBtn">
                        <span id="currentLangText">RU</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="lang-dropdown-content" id="langDropdownContent">
                        <a href="#" data-lang="ru" class="lang-option active">🇷🇺 Русский</a>
                        <a href="#" data-lang="es" class="lang-option">🇪🇸 Español</a>
                        <a href="#" data-lang="en" class="lang-option">🇬🇧 English</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="store-nav">
        <div class="container">
            <a href="index.html" class="store-link"><i class="fas fa-home"></i> Главная</a>
            <a href="epic.html" class="store-link"><i class="fas fa-gift"></i> Epic Games</a>
            <a href="steam.html" class="store-link"><i class="fab fa-steam"></i> Steam</a>
            <a href="ps.html" class="store-link active"><i class="fab fa-playstation"></i> PlayStation</a>
            <a href="xbox.html" class="store-link"><i class="fab fa-xbox"></i> Xbox</a>
        </div>
    </nav>

    <section class="hero" style="padding:50px 0 30px;">
        <div class="container">
            <h1><i class="fab fa-playstation"></i> PlayStation Plus</h1>
            <p>Бесплатные игры июня 2026</p>
        </div>
    </section>

    <section class="games">
        <div class="container">
            <div class="ps-games-grid" id="psGames"></div>
        </div>
    </section>

    <section class="subscribe">
        <div class="container">
            <h2>Нужна подписка PS Plus</h2>
            <p>Для получения игр оформи подписку PlayStation Plus</p>
            <a href="https://www.playstation.com/ps-plus/" class="btn-telegram" target="_blank">🎮 Узнать про PS Plus</a>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Free Games Hub. <a href="index.html">На главную</a></p>
        </div>
    </footer>

    <script>
        var psGames = [
            { title: 'Grounded', platform: 'PS4 & PS5', image: 'https://image.api.playstation.com/vulcan/ap/rnd/202404/1120/64a12b89992b8e34ecace3e5c7d1d39b954c2ab1d73de70a.png', url: 'https://www.playstation.com/games/grounded/' },
            { title: 'Nickelodeon All-Star Brawl 2', platform: 'PS4 & PS5', image: 'https://gaming-cdn.com/images/products/14679/orig-fallback-v1/nickelodeon-all-star-brawl-2-pc-game-steam-cover.jpg?v=1701184748', url: 'https://www.playstation.com/games/nickelodeon-all-star-brawl-2/' },
            { title: 'Warhammer 40K: Darktide', platform: 'PS4 & PS5', image: 'https://www.wallpaperbetter.com/wallpaper/594/966/371/warhammer-40k-space-marines-hd-1080P-wallpaper.jpg', url: 'https://www.playstation.com/en-gb/games/warhammer-40000-darktide/' }
        ];

        var container = document.getElementById('psGames');
        container.innerHTML = psGames.map(function(game) {
            return '<div class="ps-game-card">' +
                '<img src="' + game.image + '" alt="' + game.title + '" style="width:100%;height:180px;object-fit:cover;border-radius:8px;margin-bottom:12px;" onerror="this.parentElement.querySelector(\'.ps-fallback\').style.display=\'flex\';this.style.display=\'none\';">' +
                '<div class="ps-fallback" style="display:none;background:linear-gradient(135deg,#001a33,#003366);height:180px;align-items:center;justify-content:center;font-size:60px;border-radius:8px;margin-bottom:12px;">🎮</div>' +
                '<span class="ps-badge-free">PS Plus • ' + game.platform + '</span>' +
                '<h3 class="ps-game-title">' + game.title + '</h3>' +
                '<a href="' + game.url + '" class="ps-btn" target="_blank">🎮 Подробнее</a>' +
                '</div>';
        }).join('');

        document.getElementById('langDropdownBtn').onclick = function(e) {
            e.stopPropagation();
            document.getElementById('langDropdownContent').classList.toggle('open');
        };
        document.addEventListener('click', function() {
            document.getElementById('langDropdownContent').classList.remove('open');
        });
        document.querySelectorAll('.lang-option').forEach(function(opt) {
            opt.onclick = function(e) {
                e.preventDefault();
                var lang = this.dataset.lang;
                document.getElementById('currentLangText').textContent = lang.toUpperCase();
                localStorage.setItem('lang', lang);
                location.reload();
            };
        });
        var savedLang = localStorage.getItem('lang') || 'ru';
        document.getElementById('currentLangText').textContent = savedLang.toUpperCase();
    </script>
</body>
</html>
