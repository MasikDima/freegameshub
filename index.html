<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Games Hub - Бесплатные игры</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ШАПКА -->
    <header>
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🎮</span>
                <span class="logo-text">Free Games Hub</span>
            </div>
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ru">🇷🇺 RU</button>
                <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
            </div>
        </div>
    </header>

    <!-- ГЕРОЙ-БЛОК -->
    <section class="hero">
        <div class="container">
            <h1 data-key="hero-title">Бесплатные игры каждую неделю</h1>
            <p data-key="hero-subtitle">Забери лучшие игры бесплатно, пока не поздно!</p>
            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-number" id="freeGamesCount">12</span>
                    <span class="stat-label" data-key="free-now">Бесплатно сейчас</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="upcomingCount">5</span>
                    <span class="stat-label" data-key="upcoming">Скоро будет</span>
                </div>
            </div>
        </div>
    </section>

    <!-- ФИЛЬТРЫ -->
    <section class="filters">
        <div class="container">
            <button class="filter-btn active" data-filter="all" data-key="filter-all">Все</button>
            <button class="filter-btn" data-filter="expiring" data-key="filter-expiring">🔴 Истекает</button>
            <button class="filter-btn" data-filter="new" data-key="filter-new">🟡 Новые</button>
            <button class="filter-btn" data-filter="active" data-key="filter-active">🟢 Действуют</button>
        </div>
    </section>

    <!-- КАРТОЧКИ ИГР -->
    <section class="games">
        <div class="container" id="gamesContainer">
            <!-- Игры добавляются через JavaScript -->
        </div>
    </section>

    <!-- ПОДПИСКА -->
    <section class="subscribe">
        <div class="container">
            <h2 data-key="subscribe-title">Не пропусти халяву!</h2>
            <p data-key="subscribe-text">Подпишись на уведомления в Telegram</p>
            <a href="https://t.me/ТВОЙ_КАНАЛ" class="btn-telegram" target="_blank">
                📱 Подписаться на Telegram
            </a>
        </div>
    </section>

    <!-- ПОДВАЛ -->
    <footer>
        <div class="container">
            <p>© 2026 Free Games Hub. <span data-key="footer-text">Все ссылки ведут на официальные магазины.</span></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
