<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История раздач - Free Games Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .history-card {
            background: #0f0f2a;
            border: 1px solid #1a1a3e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .history-card img {
            width: 150px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: #1a1a3e;
        }
        .badge-ended {
            background: #666;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .empty-history {
            text-align: center;
            color: #aaa;
            padding: 60px 20px;
        }
        .lang-dropdown { position: relative; display: inline-block; }
        .lang-dropdown-btn { background: #1a1a3e; color: white; border: 1px solid #2a2a5e; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 8px; min-width: 110px; justify-content: center; }
        .lang-dropdown-btn:hover { border-color: #e94560; }
        .lang-dropdown-btn .arrow { font-size: 10px; margin-left: auto; }
        .lang-dropdown-content { display: none; position: absolute; top: 100%; right: 0; margin-top: 5px; background: #1a1a3e; border: 1px solid #2a2a5e; border-radius: 8px; min-width: 160px; z-index: 200; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .lang-dropdown-content.open { display: block; }
        .lang-option { display: block; padding: 12px 20px; color: #aaa; text-decoration: none; transition: all 0.2s; font-size: 15px; }
        .lang-option:hover { background: #e94560; color: white; }
        .lang-option.active { background: #0f3460; color: white; }
        @media (max-width: 600px) {
            .history-card { flex-direction: column; }
            .history-card img { width: 100%; height: 150px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <span class="logo-text" data-key="history-title">История раздач</span>
            </div>
            <div style="display:flex;align-items:center;gap:15px;">
                <a href="index.html" style="color:#e94560;text-decoration:none;font-weight:bold;" data-key="back-home">← На главную</a>
                <div class="lang-dropdown">
                    <button class="lang-dropdown-btn" id="langDropdownBtn">
                        <span id="currentLangFlag">🇷🇺</span>
                        <span id="currentLangText">RU</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="lang-dropdown-content" id="langDropdownContent">
                        <a href="#" data-lang="ru" class="lang-option active">🇷🇺 Русский</a>
                        <a href="#" data-lang="es" class="lang-option">🇪🇸 Español</a>
                        <a href="#" data-lang="en" class="lang-option">🇬🇧 English</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="hero" style="padding:40px 0;">
        <div class="container">
            <h1 data-key="history-heading">📦 История всех раздач</h1>
            <p data-key="history-desc">Игры, которые уже закончились</p>
        </div>
    </section>

    <section style="padding:20px 0 60px 0;">
        <div class="container" id="historyContainer">
            <p class="empty-history" data-key="loading">Загрузка...</p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Free Games Hub.</p>
        </div>
    </footer>

    <script>
        // Переводы
        var t2 = {
            ru: {
                'history-title': 'История раздач',
                'back-home': '← На главную',
                'history-heading': '📦 История всех раздач',
                'history-desc': 'Игры, которые уже закончились',
                'loading': 'Загрузка...',
                'empty': 'Пока здесь нет игр. Когда раздачи закончатся — они появятся здесь.',
                'ended': '📦 Раздача завершена',
                'store': 'Магазин'
            },
            es: {
                'history-title': 'Historial',
                'back-home': '← Inicio',
                'history-heading': '📦 Historial de juegos',
                'history-desc': 'Juegos que ya terminaron',
                'loading': 'Cargando...',
                'empty': 'Aún no hay juegos. Cuando terminen las ofertas, aparecerán aquí.',
                'ended': '📦 Oferta terminada',
                'store': 'Tienda'
            },
            en: {
                'history-title': 'History',
                'back-home': '← Home',
                'history-heading': '📦 All Giveaways History',
                'history-desc': 'Games that have ended',
                'loading': 'Loading...',
                'empty': 'No games yet. When giveaways end, they will appear here.',
                'ended': '📦 Giveaway Ended',
                'store': 'Store'
            }
        };

        var lang = localStorage.getItem('lang') || 'ru';

        function updateTexts(l) {
            document.querySelectorAll('[data-key]').forEach(function(el) {
                el.textContent = t2[l][el.dataset.key] || '';
            });
        }

        function updateLangDisplay(l) {
            document.getElementById('currentLangFlag').textContent = {ru:'🇷🇺',es:'🇪🇸',en:'🇬🇧'}[l];
            document.getElementById('currentLangText').textContent = l.toUpperCase();
            document.querySelectorAll('.lang-option').forEach(function(opt) {
                opt.classList.toggle('active', opt.dataset.lang === l);
            });
        }

        function renderHistory(l) {
            var container = document.getElementById('historyContainer');
            var saved = localStorage.getItem('allHistory');
            var historyGames = saved ? JSON.parse(saved) : [];
            var alwaysFreeIds = [5, 6];
            
            historyGames = historyGames.filter(function(game) {
                return alwaysFreeIds.indexOf(game.id) === -1;
            });

            if (historyGames.length === 0) {
                container.innerHTML = '<p class="empty-history">' + t2[l]['empty'] + '</p>';
            } else {
                container.innerHTML = historyGames.reverse().map(function(game) {
                    return '<div class="history-card">' +
                        '<img src="' + game.image + '" alt="' + game.title + '" onerror="this.style.display=\'none\'">' +
                        '<div class="history-info">' +
                        '<span class="badge-ended">' + t2[l]['ended'] + '</span>' +
                        '<h3 class="game-title">' + game.title + '</h3>' +
                        '<p style="color:#aaa;">' + t2[l]['store'] + ': ' + game.store + '</p>' +
                        '</div></div>';
                }).join('');
            }
        }

        function switchLang(l) {
            lang = l;
            localStorage.setItem('lang', l);
            updateTexts(l);
            updateLangDisplay(l);
            renderHistory(l);
        }

        // Выпадающий список
        document.getElementById('langDropdownBtn').onclick = function(e) {
            e.stopPropagation();
            document.getElementById('langDropdownContent').classList.toggle('open');
        };

        document.addEventListener('click', function() {
            document.getElementById('langDropdownContent').classList.remove('open');
        });

        document.querySelectorAll('.lang-option').forEach(function(opt) {
            opt.onclick = function(e) {
                e.preventDefault();
                switchLang(this.dataset.lang);
                document.getElementById('langDropdownContent').classList.remove('open');
            };
        });

        // Запуск
        updateTexts(lang);
        updateLangDisplay(lang);
        renderHistory(lang);
    </script>
</body>
</html>
