<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История раздач - Free Games Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .history-card {
            background: #0f0f2a;
            border: 1px solid #1a1a3e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .history-card img {
            width: 150px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        .badge-ended {
            background: #666;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }
        @media (max-width: 600px) {
            .history-card { flex-direction: column; }
            .history-card img { width: 100%; height: 150px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <span class="logo-text">История раздач</span>
            </div>
            <a href="index.html" style="color:#e94560;text-decoration:none;font-weight:bold;">← На главную</a>
        </div>
    </header>

    <section class="hero" style="padding:40px 0;">
        <div class="container">
            <h1>📦 История всех раздач</h1>
            <p>Игры, которые были бесплатны на нашем сайте</p>
        </div>
    </section>

    <section style="padding:20px 0 60px 0;">
        <div class="container" id="historyContainer">
            <p style="text-align:center;color:#aaa;">Загрузка...</p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Free Games Hub.</p>
        </div>
    </footer>

    <script>
        var historyGames = [];
        var saved = localStorage.getItem('allHistory');
        if (saved) historyGames = JSON.parse(saved);
        
        var container = document.getElementById('historyContainer');
        
        if (historyGames.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#aaa;padding:40px;">Пока здесь нет игр. Когда раздачи закончатся — они появятся здесь автоматически.</p>';
        } else {
            container.innerHTML = historyGames.reverse().map(function(game) {
                return '<div class="history-card">' +
                    '<img src="' + game.image + '" alt="' + game.title + '" onerror="this.style.display=\'none\'">' +
                    '<div class="history-info">' +
                    '<span class="badge-ended">📦 Раздача завершена</span>' +
                    '<h3 class="game-title">' + game.title + '</h3>' +
                    '<p style="color:#aaa;">🏪 ' + game.store + '</p>' +
                    '</div></div>';
            }).join('');
        }
    </script>
</body>
</html>
